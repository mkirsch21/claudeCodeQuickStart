version: '3.8'
services:
  claude-dev:
    image: node:20-slim
    container_name: claude-code-quickstart
    volumes:
      - .:/workspace
      - ~/.anthropic:/root/.anthropic
    working_dir: /workspace
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NODE_ENV=development
    ports:
      - "3000:3000"
      - "8000:8000"
    command: /bin/bash
    stdin_open: true
    tty: true
    networks:
      - claude-network

networks:
  claude-network:
    driver: bridge
